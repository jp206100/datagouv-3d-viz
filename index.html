<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accidents de France</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0a0c10; --bg-surface: #12151c; --bg-elevated: #1a1e28;
      --border: #252a36; --text-primary: #e8e6e1; --text-secondary: #8a8b8e;
      --text-muted: #55575c; --accent-fatal: #ff3b30; --accent-severe: #ff9500;
      --accent-minor: #30d158; --accent-blue: #4fc3f7; --accent-glow: #ff6b3b;
      --accent-rain: #5b9bd5; --accent-fog: #9e8dc7;
      --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg-deep); color: var(--text-primary); font-family: var(--font-body); }
    #canvas-container { position: fixed; inset: 0; z-index: 0; }
    #canvas-container canvas { display: block; width: 100% !important; height: 100% !important; }
    #ui-overlay { position: fixed; inset: 0; z-index: 10; pointer-events: none; }
    #ui-overlay > * { pointer-events: auto; }
    .header { position: absolute; top: 0; left: 0; right: 0; padding: 28px 36px; display: flex; justify-content: space-between; align-items: center; background: var(--bg-deep); border-bottom: 1px solid var(--border); z-index: 1; }
    .header__title { font-family: var(--font-display); font-weight: 800; font-size: 14px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-secondary); line-height: 1.4; }
    .header__title span { display: block; font-size: 28px; letter-spacing: -0.01em; text-transform: none; color: var(--text-primary); margin-top: 4px; }
    .header__meta { text-align: right; font-size: 11px; color: var(--text-muted); letter-spacing: 0.06em; line-height: 1.6; }
    .header__meta a { color: var(--accent-blue); text-decoration: none; }
    .time-indicator { text-align: center; }
    .time-indicator__icon { font-size: 32px; line-height: 1; transition: all 0.6s ease; }
    .time-indicator__label { font-family: var(--font-display); font-size: 11px; color: var(--text-muted); letter-spacing: 0.1em; margin-top: 4px; }
    .sidebar { position: absolute; left: 36px; top: 100px; bottom: 36px; display: flex; flex-direction: column; justify-content: space-between; width: 180px; }
    .stats { display: flex; flex-direction: column; gap: 14px; background: rgba(255, 255, 255, 0.65); padding: 16px; border-radius: 12px; }
    .stats__item { display: flex; flex-direction: column; }
    .stats__value { font-family: var(--font-display); font-weight: 700; font-size: 24px; color: #333; line-height: 1; }
    .stats__label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px; }
    .legend { display: flex; flex-direction: column; gap: 8px; background: rgba(255, 255, 255, 0.65); padding: 16px; border-radius: 12px; }
    .legend__item { display: flex; align-items: center; gap: 10px; font-size: 11px; color: #333; letter-spacing: 0.04em; }
    .legend__dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .weather-filters { display: flex; gap: 6px; flex-wrap: wrap; background: rgba(255, 255, 255, 0.65); padding: 16px; border-radius: 12px; }
    .weather-chip { padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: #333; font-size: 10px; font-family: var(--font-body); letter-spacing: 0.04em; cursor: pointer; transition: all 0.2s; }
    .weather-chip:hover { border-color: var(--text-secondary); color: var(--text-secondary); }
    .weather-chip.active { background: var(--bg-elevated); border-color: var(--accent-blue); color: var(--text-primary); }
    .controls { position: absolute; right: 36px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 6px; }
    .controls__btn { width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-secondary); font-size: 16px; cursor: pointer; display: grid; place-items: center; transition: all 0.2s; }
    .controls__btn:hover { background: var(--bg-elevated); color: var(--text-primary); border-color: var(--accent-blue); }
    .controls__btn.active { background: var(--accent-glow); color: #fff; border-color: var(--accent-glow); }
    .scrubber-group { background: rgba(255, 255, 255, 0.65); padding: 16px; border-radius: 12px; display: flex; flex-direction: column; gap: 16px; }
    .scrubber-section { display: flex; flex-direction: column; }
    .scrubber__label { font-size: 10px; color: #333; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
    .scrubber__year { font-family: var(--font-display); font-weight: 700; font-size: 22px; color: #333; line-height: 1; margin-bottom: 6px; user-select: none; }
    .scrubber__hour-label { font-family: var(--font-display); font-weight: 700; font-size: 22px; color: #333; line-height: 1; margin-bottom: 6px; user-select: none; }
    .scrubber__track { width: 100%; -webkit-appearance: none; appearance: none; height: 3px; background: var(--border); border-radius: 2px; outline: none; cursor: pointer; }
    .scrubber__track::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent-glow); box-shadow: 0 0 12px rgba(255,107,59,0.5); cursor: grab; }
    .scrubber__track--hour::-webkit-slider-thumb { background: var(--accent-blue); box-shadow: 0 0 12px rgba(79,195,247,0.5); }
    .scrubber__labels { display: flex; justify-content: space-between; margin-top: 6px; font-size: 9px; color: #333; letter-spacing: 0.08em; font-family: var(--font-display); }
    .loading { position: fixed; inset: 0; z-index: 100; background: rgba(10,12,16,0.85); backdrop-filter: blur(6px); display: grid; place-items: center; transition: opacity 0.8s ease, visibility 0.8s; }
    .loading.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .loading__text { font-family: var(--font-display); font-weight: 700; font-size: 18px; color: var(--text-secondary); letter-spacing: 0.08em; transition: opacity 0.2s; }
    .loading__detail { font-family: var(--font-body); font-size: 12px; color: var(--text-muted); letter-spacing: 0.04em; margin-top: 8px; min-height: 16px; transition: opacity 0.2s; }
    .loading__bar { width: 200px; height: 2px; background: var(--border); margin-top: 16px; border-radius: 1px; overflow: hidden; }
    .loading__fill { height: 100%; width: 0%; background: var(--accent-glow); border-radius: 1px; transition: width 0.3s; }
    @keyframes pulse-glow { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
    .loading__text { animation: pulse-glow 2s ease-in-out infinite; }
    .tooltip { position: fixed; padding: 12px 16px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 8px; font-size: 12px; color: var(--text-primary); pointer-events: none; opacity: 0; transform: translateY(4px); transition: opacity 0.15s, transform 0.15s; z-index: 50; max-width: 260px; line-height: 1.5; backdrop-filter: blur(8px); }
    .tooltip.visible { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div class="loading" id="loading">
    <div class="loading__inner" style="text-align:center;">
      <div class="loading__text">LOADING ACCIDENT DATA</div>
      <div class="loading__detail" id="loading-detail"></div>
      <div class="loading__bar"><div class="loading__fill" id="loading-fill"></div></div>
    </div>
  </div>
  <div id="ui-overlay">
    <div class="header">
      <div class="header__title">data.gouv.fr<span>Accidents de France</span></div>
      <div class="time-indicator" id="time-indicator">
        <div class="time-indicator__icon" id="time-icon">&#9790;</div>
        <div class="time-indicator__label" id="time-label">ALL HOURS</div>
      </div>
      <div class="header__meta">Source: ONISR / BAAC<br><a href="https://www.data.gouv.fr" target="_blank">data.gouv.fr</a> · <a href="https://mcp.data.gouv.fr/mcp" target="_blank">MCP</a></div>
    </div>
    <div class="sidebar">
      <div class="stats" id="stats">
        <div class="stats__item"><div class="stats__value" id="stat-total">&mdash;</div><div class="stats__label">Accidents</div></div>
        <div class="stats__item"><div class="stats__value" id="stat-fatal">&mdash;</div><div class="stats__label">Fatal</div></div>
        <div class="stats__item"><div class="stats__value" id="stat-hospitalized">&mdash;</div><div class="stats__label">Hospitalized</div></div>
      </div>
      <div class="legend">
        <div class="legend__item"><div class="legend__dot" style="background:var(--accent-fatal);box-shadow:0 0 6px var(--accent-fatal);"></div>Fatal</div>
        <div class="legend__item"><div class="legend__dot" style="background:var(--accent-severe);"></div>Hospitalized</div>
        <div class="legend__item"><div class="legend__dot" style="background:var(--accent-minor);"></div>Minor injury</div>
        <div class="legend__item"><div class="legend__dot" style="background:var(--accent-rain);"></div>Rain</div>
        <div class="legend__item"><div class="legend__dot" style="background:var(--accent-fog);"></div>Fog / Snow</div>
      </div>
      <div class="weather-filters" id="weather-filters">
        <button class="weather-chip active" data-weather="all">All</button>
        <button class="weather-chip" data-weather="normal">Clear sky</button>
        <button class="weather-chip" data-weather="rain">Rain</button>
        <button class="weather-chip" data-weather="fog">Fog</button>
        <button class="weather-chip" data-weather="snow">Snow</button>
        <button class="weather-chip" data-weather="night">Night</button>
      </div>
      <div class="scrubber-group">
        <div class="scrubber-section">
          <div class="scrubber__label">Year</div>
          <div class="scrubber__year" id="scrubber-year">2024</div>
          <input type="range" class="scrubber__track" id="year-slider" min="2005" max="2024" value="2024" step="1" />
          <div class="scrubber__labels"><span>2005</span><span>2015</span><span>2024</span></div>
        </div>
        <div class="scrubber-section">
          <div class="scrubber__label">Time of day</div>
          <div class="scrubber__hour-label" id="hour-label">ALL</div>
          <input type="range" class="scrubber__track scrubber__track--hour" id="hour-slider" min="-1" max="23" value="-1" step="1" />
          <div class="scrubber__labels"><span>All</span><span>12</span><span>23</span></div>
        </div>
      </div>
    </div>
    <div class="controls">
      <button class="controls__btn" id="btn-rotate" title="Auto-rotate">&#10227;</button>
      <button class="controls__btn" id="btn-pulse" title="Toggle pulse waves">&#10740;</button>
      <button class="controls__btn" id="btn-reset" title="Reset camera">&#8962;</button>
    </div>
  </div>
  <div class="tooltip" id="tooltip"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
